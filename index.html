<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Arena</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-hover: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-glow: rgba(88, 166, 255, 0.15);
    --green: #3fb950;
    --orange: #d29922;
    --purple: #bc8cff;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    padding: 48px 32px 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--accent-glow) 0%, transparent 100%);
  }
  .header h1 {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .header h1 span { color: var(--accent); }
  .header p { color: var(--text-muted); font-size: 1.05rem; max-width: 560px; margin: 0 auto; }

  /* ── Layout ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

  /* ── Scenario Cards ── */
  .scenario-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }
  .scenario-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    cursor: default;
  }
  .scenario-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 24px var(--accent-glow);
  }
  .scenario-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 20px 16px;
  }
  .scenario-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .scenario-icon.gradient   { background: rgba(255,107,107,0.15); }
  .scenario-icon.spreadsheet { background: rgba(63,185,80,0.15); }
  .scenario-icon.pathfinding { background: rgba(188,140,255,0.15); }
  .scenario-icon.tests      { background: rgba(210,153,34,0.15); }
  .scenario-title { font-size: 1.15rem; font-weight: 600; }
  .scenario-count { font-size: 0.8rem; color: var(--text-muted); }

  /* ── File List ── */
  .file-list { padding: 0 20px 20px; }
  .file-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 0.92rem;
  }
  .file-item:hover { background: var(--bg-hover); }
  .file-item .file-icon { font-size: 1rem; flex-shrink: 0; }
  .file-item .file-name { color: var(--text); flex: 1; }
  .file-item .file-badge {
    font-size: 0.7rem; padding: 2px 8px;
    border-radius: 99px; font-weight: 600; text-transform: uppercase;
  }
  .file-badge.html { background: rgba(88,166,255,0.15); color: var(--accent); }
  .file-badge.md   { background: rgba(63,185,80,0.15); color: var(--green); }

  /* ── Detail Panel ── */
  .detail-panel {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    display: none;
    z-index: 100;
  }
  .detail-panel.open { display: flex; }
  .detail-content {
    background: var(--bg);
    border: 1px solid var(--border);
    width: 90vw; max-width: 1100px;
    margin: auto;
    border-radius: var(--radius);
    overflow: hidden;
    display: flex; flex-direction: column;
    max-height: 90vh;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .detail-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
    flex-shrink: 0;
  }
  .detail-toolbar h2 { font-size: 1rem; font-weight: 600; }
  .detail-toolbar h2 .breadcrumb { color: var(--text-muted); font-weight: 400; font-size: 0.85rem; }
  .detail-close {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; transition: all 0.15s;
  }
  .detail-close:hover { background: var(--bg-hover); color: var(--text); }

  .detail-body {
    flex: 1; overflow: auto; padding: 0;
    min-height: 400px;
  }

  /* ── Markdown Rendering ── */
  .md-viewer { padding: 24px 28px; line-height: 1.7; }
  .md-viewer h1 { font-size: 1.8rem; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
  .md-viewer h2 { font-size: 1.4rem; margin: 28px 0 12px; }
  .md-viewer h3 { font-size: 1.15rem; margin: 20px 0 8px; color: var(--text-muted); }
  .md-viewer p { margin-bottom: 14px; }
  .md-viewer code {
    background: var(--bg-card); border: 1px solid var(--border);
    padding: 2px 6px; border-radius: 6px; font-size: 0.88em;
    font-family: "SF Mono", "Fira Code", monospace;
  }
  .md-viewer pre {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; overflow-x: auto;
    margin-bottom: 16px;
  }
  .md-viewer pre code { background: none; border: none; padding: 0; }
  .md-viewer ul, .md-viewer ol { margin: 0 0 14px 24px; }
  .md-viewer li { margin-bottom: 6px; }
  .md-viewer blockquote {
    border-left: 3px solid var(--accent);
    padding: 8px 16px; margin: 16px 0;
    background: var(--accent-glow); border-radius: 0 8px 8px 0;
  }
  .md-viewer table { border-collapse: collapse; width: 100%; margin: 16px 0; }
  .md-viewer th, .md-viewer td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .md-viewer th { background: var(--bg-card); font-weight: 600; }

  /* ── HTML Preview ── */
  .html-preview { width: 100%; height: 100%; border: none; }

  /* ── Empty State ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; padding: 60px;
    text-align: center; color: var(--text-muted);
  }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-state p { font-size: 1rem; }

  /* ── Loading Spinner ── */
  .loading { display: flex; align-items: center; justify-content: center; height: 100%; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Footer ── */
  .footer {
    text-align: center; padding: 32px;
    border-top: 1px solid var(--border);
    color: var(--text-muted); font-size: 0.85rem;
  }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .header { padding: 32px 16px 24px; }
    .header h1 { font-size: 1.8rem; }
    .scenario-grid { grid-template-columns: 1fr; gap: 16px; }
    .detail-content { width: 100vw; height: 100vh; max-width: none; border-radius: 0; margin: 0; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>LLM <span>Arena</span></h1>
  <p>A learning series comparing how different LLMs interpret the same prompts — side by side.</p>
</div>

<div class="container">
  <div class="scenario-grid" id="scenarioGrid"></div>
</div>

<div class="footer">
  Built for the <a href="https://github.com/Tivasco/llm-arena" target="_blank">LLM Arena</a> project &middot; Every model gets its own folder for fair comparison
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-content">
    <div class="detail-toolbar">
      <h2><span class="breadcrumb" id="breadcrumb"></span> <span id="detailTitle"></span></h2>
      <button class="detail-close" id="detailClose" title="Close">&times;</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<script>
// ── Repo config ──
const OWNER = "Tivasco";
const REPO  = "llm-arena";
const BRANCH = "main";
const BASE   = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}`;

// ── Scenario definitions ──
const SCENARIOS = [
  {
    name: "Pathfinding Visualizer",
    key: "pathfindingvisualizer",
    icon: "🧭",
    iconClass: "pathfinding",
    path: "pathfindingvisualizer",
    files: null // fetched dynamically
  },
  {
    name: "Gradient Challenge",
    key: "gradient",
    icon: "🌈",
    iconClass: "gradient",
    path: "gradient",
    files: null
  },
  {
    name: "Spreadsheet Challenge",
    key: "spreadsheet",
    icon: "📊",
    iconClass: "spreadsheet",
    path: "spreadsheet",
    files: null
  },
  {
    name: "Test Prompts",
    key: "tests",
    icon: "📝",
    iconClass: "tests",
    path: "tests",
    files: null
  }
];

// ── Simple Markdown → HTML ──
function renderMarkdown(md) {
  // Code blocks
  md = md.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code class="language-${lang}">${escapeHtml(code.trim())}</code></pre>`;
  });
  // Inline code
  md = md.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  md = md.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  md = md.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  md = md.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold / italic
  md = md.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  md = md.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Blockquote
  md = md.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered list
  md = md.replace(/^- (.+)$/gm, '<li>$1</li>');
  md = md.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // Links
  md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Paragraphs
  md = md.replace(/\n\n/g, '</p><p>');
  md = md.replace(/\n/g, '<br>');
  return `<p>${md}</p>`;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render scenario cards ──
async function renderScenarios() {
  const grid = document.getElementById("scenarioGrid");

  for (const scenario of SCENARIOS) {
    const card = document.createElement("div");
    card.className = "scenario-card";
    card.id = `scenario-${scenario.key}`;

    card.innerHTML = `
      <div class="scenario-header">
        <div class="scenario-icon ${scenario.iconClass}">${scenario.icon}</div>
        <div>
          <div class="scenario-title">${scenario.name}</div>
          <div class="scenario-count" id="count-${scenario.key}">Loading…</div>
        </div>
      </div>
      <div class="file-list" id="files-${scenario.key}">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    `;
    grid.appendChild(card);

    // Fetch directory listing
    try {
      const resp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${scenario.path}?ref=${BRANCH}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const items = await resp.json();
      scenario.files = items;

      const countEl = document.getElementById(`count-${scenario.key}`);
      countEl.textContent = `${items.length} file${items.length !== 1 ? 's' : ''}`;

      const fileList = document.getElementById(`files-${scenario.key}`);
      fileList.innerHTML = "";

      // Sort: files first, then directories
      const sorted = items.sort((a, b) => {
        if (a.type === b.type) return a.name.localeCompare(b.name);
        return a.type === "file" ? -1 : 1;
      });

      for (const item of sorted) {
        const isDir = item.type === "dir";
        const ext = isDir ? null : item.name.split(".").pop();
        const isHtml = ext === "html";
        const isMd = ext === "md";

        const fileEl = document.createElement("div");
        fileEl.className = "file-item";

        if (isDir) {
          fileEl.innerHTML = `
            <span class="file-icon">📁</span>
            <span class="file-name">${item.name}</span>
          `;
          fileEl.addEventListener("click", () => openFolder(scenario, item));
        } else if (isHtml) {
          fileEl.innerHTML = `
            <span class="file-icon">🌐</span>
            <span class="file-name">${item.name}</span>
            <span class="file-badge html">HTML</span>
          `;
          fileEl.addEventListener("click", () => openFile(scenario, item));
        } else if (isMd) {
          fileEl.innerHTML = `
            <span class="file-icon">📄</span>
            <span class="file-name">${item.name}</span>
            <span class="file-badge md">MD</span>
          `;
          fileEl.addEventListener("click", () => openFile(scenario, item));
        } else {
          fileEl.innerHTML = `
            <span class="file-icon">📎</span>
            <span class="file-name">${item.name}</span>
          `;
          fileEl.addEventListener("click", () => openFile(scenario, item));
        }

        fileList.appendChild(fileEl);
      }
    } catch (err) {
      document.getElementById(`files-${scenario.key}`).innerHTML =
        `<div style="padding:12px;color:var(--orange);font-size:0.9rem;">⚠️ Could not load: ${err.message}</div>`;
      document.getElementById(`count-${scenario.key}`).textContent = "Error loading";
    }
  }
}

// ── Open a sub-folder ──
async function openFolder(scenario, dirItem) {
  const panel = document.getElementById("detailPanel");
  const body = document.getElementById("detailBody");
  const title = document.getElementById("detailTitle");
  const breadcrumb = document.getElementById("breadcrumb");

  breadcrumb.textContent = `${scenario.name} / `;
  title.textContent = dirItem.name;
  body.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
  panel.classList.add("open");

  try {
    const resp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${scenario.path}/${dirItem.name}?ref=${BRANCH}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const items = await resp.json();

    // Sort: files first, then directories
    const sorted = items.sort((a, b) => {
      if (a.type === b.type) return a.name.localeCompare(b.name);
      return a.type === "file" ? -1 : 1;
    });

    let html = `<div class="file-list" style="padding:20px;">`;
    for (const item of sorted) {
      const isDir = item.type === "dir";
      const ext = isDir ? null : item.name.split(".").pop();
      const isHtml = ext === "html";
      const isMd = ext === "md";

      if (isDir) {
        html += `
          <div class="file-item" data-path="${scenario.path}/${dirItem.name}/${item.name}">
            <span class="file-icon">📁</span>
            <span class="file-name">${item.name}</span>
          </div>`;
      } else if (isHtml) {
        html += `
          <div class="file-item" data-path="${scenario.path}/${dirItem.name}/${item.name}" data-type="html">
            <span class="file-icon">🌐</span>
            <span class="file-name">${item.name}</span>
            <span class="file-badge html">HTML</span>
          </div>`;
      } else if (isMd) {
        html += `
          <div class="file-item" data-path="${scenario.path}/${dirItem.name}/${item.name}" data-type="md">
            <span class="file-icon">📄</span>
            <span class="file-name">${item.name}</span>
            <span class="file-badge md">MD</span>
          </div>`;
      } else {
        html += `
          <div class="file-item" data-path="${scenario.path}/${dirItem.name}/${item.name}">
            <span class="file-icon">📎</span>
            <span class="file-name">${item.name}</span>
          </div>`;
      }
    }
    html += `</div>`;
    body.innerHTML = html;

    // Attach click handlers for this level
    body.querySelectorAll(".file-item").forEach(el => {
      el.addEventListener("click", async () => {
        const path = el.dataset.path;
        const type = el.dataset.type;

        if (type === "html") {
          breadcrumb.textContent = `${scenario.name} / ${dirItem.name} / `;
          title.textContent = el.querySelector(".file-name").textContent;
          body.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
          const resp = await fetch(`${BASE}/${path}`);
          const content = await resp.text();
body.innerHTML = renderHtmlPreview(content);
        } else if (type === "md") {
          breadcrumb.textContent = `${scenario.name} / ${dirItem.name} / `;
          title.textContent = el.querySelector(".file-name").textContent;
          body.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
          const resp = await fetch(`${BASE}/${path}`);
          const content = await resp.text();
          body.innerHTML = `<div class="md-viewer">${renderMarkdown(content)}</div>`;
        } else if (el.querySelector(".file-icon")?.textContent === "📁") {
          // Navigate into sub-folder
          breadcrumb.textContent = `${scenario.name} / ${dirItem.name} / `;
          title.textContent = el.querySelector(".file-name").textContent;
          body.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
          // Recursive: fetch that sub-directory
          const subResp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`);
          if (!subResp.ok) throw new Error(`HTTP ${subResp.status}`);
          const subItems = await subResp.json();
          const subSorted = subItems.sort((a, b) => {
            if (a.type === b.type) return a.name.localeCompare(b.name);
            return a.type === "file" ? -1 : 1;
          });
          let subHtml = `<div class="file-list" style="padding:20px;">`;
          for (const item of subSorted) {
            const isDir = item.type === "dir";
            const ext = isDir ? null : item.name.split(".").pop();
            const isHtml = ext === "html";
            const isMd = ext === "md";
            if (isDir) {
              subHtml += `<div class="file-item" data-path="${path}/${item.name}"><span class="file-icon">📁</span><span class="file-name">${item.name}</span></div>`;
            } else if (isHtml) {
              subHtml += `<div class="file-item" data-path="${path}/${item.name}" data-type="html"><span class="file-icon">🌐</span><span class="file-name">${item.name}</span><span class="file-badge html">HTML</span></div>`;
            } else if (isMd) {
              subHtml += `<div class="file-item" data-path="${path}/${item.name}" data-type="md"><span class="file-icon">📄</span><span class="file-name">${item.name}</span><span class="file-badge md">MD</span></div>`;
            } else {
              subHtml += `<div class="file-item" data-path="${path}/${item.name}"><span class="file-icon">📎</span><span class="file-name">${item.name}</span></div>`;
            }
          }
          subHtml += `</div>`;
          body.innerHTML = subHtml;
          body.querySelectorAll(".file-item").forEach(el2 => {
            el2.addEventListener("click", async () => {
              const p2 = el2.dataset.path;
              const t2 = el2.dataset.type;
              if (t2 === "html") {
                breadcrumb.textContent += el2.querySelector(".file-name").textContent + " / ";
                title.textContent = el2.querySelector(".file-name").textContent;
                body.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
                const r = await fetch(`${BASE}/${p2}`);
                const c = await r.text();
body.innerHTML = renderHtmlPreview(c);
              } else if (t2 === "md") {
                breadcrumb.textContent += el2.querySelector(".file-name").textContent + " / ";
                title.textContent = el2.querySelector(".file-name").textContent;
                body.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
                const r = await fetch(`${BASE}/${p2}`);
                const c = await r.text();
                body.innerHTML = `<div class="md-viewer">${renderMarkdown(c)}</div>`;
              } else if (el2.querySelector(".file-icon")?.textContent === "📁") {
                // Go up one level
                const parts = p2.split("/");
                parts.pop();
                const parentPath = parts.join("/");
                const parentResp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${parentPath}?ref=${BRANCH}`);
                const parentItems = await parentResp.json();
                renderFileList(parentItems, parentPath);
              }
            });
          });
        } else {
          // Go up one level
          const parts = path.split("/");
          parts.pop();
          const parentPath = parts.join("/");
          const parentResp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${parentPath}?ref=${BRANCH}`);
          const parentItems = await parentResp.json();
          renderFileList(parentItems, parentPath);
        }
      });
    });

  } catch (err) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Could not load folder: ${err.message}</p></div>`;
  }
}

function renderFileList(items, path) {
  const body = document.getElementById("detailBody");
  let html = `<div class="file-list" style="padding:20px;">`;
  for (const item of items) {
    const isDir = item.type === "dir";
    const ext = isDir ? null : item.name.split(".").pop();
    const isHtml = ext === "html";
    const isMd = ext === "md";
    if (isDir) {
      html += `<div class="file-item" data-path="${path}/${item.name}"><span class="file-icon">📁</span><span class="file-name">${item.name}</span></div>`;
    } else if (isHtml) {
      html += `<div class="file-item" data-path="${path}/${item.name}" data-type="html"><span class="file-icon">🌐</span><span class="file-name">${item.name}</span><span class="file-badge html">HTML</span></div>`;
    } else if (isMd) {
      html += `<div class="file-item" data-path="${path}/${item.name}" data-type="md"><span class="file-icon">📄</span><span class="file-name">${item.name}</span><span class="file-badge md">MD</span></div>`;
    } else {
      html += `<div class="file-item" data-path="${path}/${item.name}"><span class="file-icon">📎</span><span class="file-name">${item.name}</span></div>`;
    }
  }
  html += `</div>`;
  body.innerHTML = html;
  body.querySelectorAll(".file-item").forEach(el => {
    el.addEventListener("click", async () => {
      const p = el.dataset.path;
      const t = el.dataset.type;
      if (t === "html") {
        breadcrumb.textContent += el.querySelector(".file-name").textContent + " / ";
        title.textContent = el.querySelector(".file-name").textContent;
        body.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
        const r = await fetch(`${BASE}/${p}`);
        const c = await r.text();
        body.innerHTML = renderHtmlPreview(c);
      } else if (t === "md") {
        breadcrumb.textContent += el.querySelector(".file-name").textContent + " / ";
        title.textContent = el.querySelector(".file-name").textContent;
        body.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
        const r = await fetch(`${BASE}/${p}`);
        const c = await r.text();
        body.innerHTML = `<div class="md-viewer">${renderMarkdown(c)}</div>`;
      } else if (el.querySelector(".file-icon")?.textContent === "📁") {
        const subResp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${p}?ref=${BRANCH}`);
        const subItems = await subResp.json();
        const subSorted = subItems.sort((a, b) => {
          if (a.type === b.type) return a.name.localeCompare(b.name);
          return a.type === "file" ? -1 : 1;
        });
        let subHtml = `<div class="file-list" style="padding:20px;">`;
        for (const item of subSorted) {
          const isDir = item.type === "dir";
          const ext = isDir ? null : item.name.split(".").pop();
          const isHtml = ext === "html";
          const isMd = ext === "md";
          if (isDir) {
            subHtml += `<div class="file-item" data-path="${p}/${item.name}"><span class="file-icon">📁</span><span class="file-name">${item.name}</span></div>`;
          } else if (isHtml) {
            subHtml += `<div class="file-item" data-path="${p}/${item.name}" data-type="html"><span class="file-icon">🌐</span><span class="file-name">${item.name}</span><span class="file-badge html">HTML</span></div>`;
          } else if (isMd) {
            subHtml += `<div class="file-item" data-path="${p}/${item.name}" data-type="md"><span class="file-icon">📄</span><span class="file-name">${item.name}</span><span class="file-badge md">MD</span></div>`;
          } else {
            subHtml += `<div class="file-item" data-path="${p}/${item.name}"><span class="file-icon">📎</span><span class="file-name">${item.name}</span></div>`;
          }
        }
        subHtml += `</div>`;
        body.innerHTML = subHtml;
        body.querySelectorAll(".file-item").forEach(el2 => {
          el2.addEventListener("click", async () => {
            const p2 = el2.dataset.path;
            const t2 = el2.dataset.type;
            if (t2 === "html") {
              breadcrumb.textContent += el2.querySelector(".file-name").textContent + " / ";
              title.textContent = el2.querySelector(".file-name").textContent;
              body.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
              const r = await fetch(`${BASE}/${p2}`);
              const c = await r.text();
        body.innerHTML = renderHtmlPreview(c);
            } else if (t2 === "md") {
              breadcrumb.textContent += el2.querySelector(".file-name").textContent + " / ";
              title.textContent = el2.querySelector(".file-name").textContent;
              body.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
              const r = await fetch(`${BASE}/${p2}`);
              const c = await r.text();
              body.innerHTML = `<div class="md-viewer">${renderMarkdown(c)}</div>`;
            } else if (el2.querySelector(".file-icon")?.textContent === "📁") {
              const parts = p2.split("/");
              parts.pop();
              const parentPath = parts.join("/");
              const parentResp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${parentPath}?ref=${BRANCH}`);
              const parentItems = await parentResp.json();
              renderFileList(parentItems, parentPath);
            }
          });
        });
      } else {
        const parts = p.split("/");
        parts.pop();
        const parentPath = parts.join("/");
        const parentResp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${parentPath}?ref=${BRANCH}`);
        const parentItems = await parentResp.json();
        renderFileList(parentItems, parentPath);
      }
    });
  });
}

function renderHtmlPreview(content) {
  const blob = new Blob([content], { type: "text/html" });
  const url = URL.createObjectURL(blob);
  return `<iframe class="html-preview" src="${url}" sandbox="allow-scripts allow-same-origin"></iframe>`;
}

// ── Open a top-level file directly ──
async function openFile(scenario, fileItem) {
  const panel = document.getElementById("detailPanel");
  const body = document.getElementById("detailBody");
  const title = document.getElementById("detailTitle");
  const breadcrumb = document.getElementById("breadcrumb");

  breadcrumb.textContent = `${scenario.name} / `;
  title.textContent = fileItem.name;
  body.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
  panel.classList.add("open");

  const ext = fileItem.name.split(".").pop();
  const isHtml = ext === "html";
  const isMd = ext === "md";

  if (isHtml) {
    const resp = await fetch(`${BASE}/${fileItem.path}`);
    const content = await resp.text();
    body.innerHTML = renderHtmlPreview(content);
  } else if (isMd) {
    const resp = await fetch(`${BASE}/${fileItem.path}`);
    const content = await resp.text();
    body.innerHTML = `<div class="md-viewer">${renderMarkdown(content)}</div>`;
  }
}

// ── Close panel ──
document.getElementById("detailClose").addEventListener("click", () => {
  document.getElementById("detailPanel").classList.remove("open");
});
document.getElementById("detailPanel").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById("detailPanel").classList.remove("open");
  }
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    document.getElementById("detailPanel").classList.remove("open");
  }
});

// ── Init ──
renderScenarios();
